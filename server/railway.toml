# Railway config when this service is deployed with Root Directory = server
# Use Dockerfile so PORT binding and gunicorn CMD are consistent (avoids 502).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
